# trends.yaml — baza tematów i konfiguracja TrendAgent

# Strategia wyszukiwania trendów
strategy:
  # Metody w kolejności prób (pierwsza dostępna wygrywa)
  # "pytrends"  — Google Trends (wymaga pytrends w requirements.txt)
  # "static"    — Statyczna baza poniżej (zawsze dostępna, fallback)
  methods:
    - pytrends
    - static
  # Liczba sugestii do zwrócenia
  suggestions_count: 5
  # Pytrends: region i język
  pytrends_geo: "US"
  pytrends_hl: "en-US"
  # Pytrends: słowa kluczowe kontekstu do porównania
  pytrends_context: "cookie cutter"

# Statyczna baza tematów (fallback + seed)
topics:
  evergreen:
    - topic: "floral wreath"
      product_type: "cutter"
      priority: high
      reason: "Consistently top-selling floral design, year-round appeal for home bakers."

    - topic: "botanical leaf"
      product_type: "stamp"
      priority: high
      reason: "Botanical motifs have strong search volume; pairs well with cottagecore aesthetics."

    - topic: "celestial moon and stars"
      product_type: "set"
      priority: high
      reason: "Fastest-growing niche; moon+stars sets drive higher average order value."

    - topic: "geometric hexagon"
      product_type: "cutter"
      priority: medium
      reason: "Minimalist appeal; popular for modern cookie boards and custom cakes."

    - topic: "cottagecore mushroom"
      product_type: "cutter"
      priority: medium
      reason: "Sustained social-media trend driving strong Etsy search traffic."

    - topic: "butterfly"
      product_type: "stamp"
      priority: medium
      reason: "Perennial favourite for spring gifting and children's parties."

    - topic: "heart"
      product_type: "cutter"
      priority: medium
      reason: "Most-searched cookie cutter shape; converts well around Valentine's Day."

    - topic: "boho sun"
      product_type: "stamp"
      priority: medium
      reason: "Trending in home décor; translates naturally to cookie stamps."

    - topic: "monogram letter"
      product_type: "cutter"
      priority: medium
      reason: "Personalised cutters appeal to custom-order bakers and bridal markets."

    - topic: "kitchen classics rolling pin"
      product_type: "stamp"
      priority: medium
      reason: "Novelty gift for home cooks; consistent demand in baking gift niche."

    - topic: "dinosaur"
      product_type: "cutter"
      priority: medium
      reason: "Strong children's party demand; popular year-round for birthday cookies."

    - topic: "sunflower"
      product_type: "cutter"
      priority: medium
      reason: "Summer and harvest season best-seller; popular in farmhouse style."

    - topic: "cat paw"
      product_type: "cutter"
      priority: medium
      reason: "Pet lovers niche; strong repeat buyers for cat-themed baking gifts."

    - topic: "cactus"
      product_type: "cutter"
      priority: medium
      reason: "Desert/boho aesthetic; popular for themed parties and gifts."

    - topic: "bee honeycomb"
      product_type: "set"
      priority: medium
      reason: "Honey bee trend in home goods; set format increases order value."

  holiday:
    Q1:  # Jan–Mar
      - topic: "valentine heart"
        product_type: "cutter"
        priority: high
        reason: "Valentine's Day peak in February; consistent top seller."

      - topic: "shamrock"
        product_type: "cutter"
        priority: medium
        reason: "St. Patrick's Day; short but intense search spike in March."

    Q2:  # Apr–Jun
      - topic: "easter bunny"
        product_type: "cutter"
        priority: high
        reason: "Easter peak; one of highest-volume seasonal searches."

      - topic: "easter egg"
        product_type: "set"
        priority: high
        reason: "Easter set drives premium pricing; strong family baking appeal."

    Q3:  # Jul–Sep
      - topic: "back to school pencil"
        product_type: "cutter"
        priority: medium
        reason: "Back-to-school gifting; teachers and parents key audience."

    Q4:  # Oct–Dec
      - topic: "halloween pumpkin"
        product_type: "cutter"
        priority: high
        reason: "Peak October demand; one of highest-volume seasonal searches."

      - topic: "halloween ghost"
        product_type: "cutter"
        priority: high
        reason: "Halloween search spike; fun design for parties and kids."

      - topic: "christmas snowflake"
        product_type: "cutter"
        priority: high
        reason: "Peak November-December; highest-volume holiday search."

      - topic: "christmas tree"
        product_type: "set"
        priority: high
        reason: "Christmas tree set commands premium Q4 prices."

      - topic: "gingerbread house"
        product_type: "cutter"
        priority: high
        reason: "Major October-December search spike; traditional holiday baking."

      - topic: "santa claus"
        product_type: "cutter"
        priority: high
        reason: "Classic Christmas figure; strong gifting appeal."

      - topic: "reindeer"
        product_type: "cutter"
        priority: medium
        reason: "Holiday favourite; often bought as set with Santa."
